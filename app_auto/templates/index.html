<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Procesador Automático de Facturas</title>

<style>

body{
    font-family:"Segoe UI",sans-serif;
    margin:0;
    background:#F3F6F4;
}

.header{
    background:#1F6F43;
    color:white;
    padding:20px 40px;
    font-size:26px;
    font-weight:bold;
    border-bottom:4px solid #B7C800;
}

.container{
    max-width:1200px;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    border:1px solid #DCE3DD;
    margin-bottom:20px;
}

button{
    background:#1F6F43;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#165533;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:15px;
    margin-top:20px;
}

.kpi{
    background:#EDF6F1;
    padding:20px;
    border-radius:8px;
    text-align:center;
}

.kpi-num{
    font-size:32px;
    font-weight:bold;
    color:#1F6F43;
}

.kpi-text{
    margin-top:6px;
    color:#666;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#EDF6F1;
    padding:10px;
    border:1px solid #DCE3DD;
}

td{
    padding:8px;
    border:1px solid #E3E8E3;
    text-align:center;
}

.estado-procesada{
    color:green;
    font-weight:bold;
}

.estado-manual{
    color:#d97706;
    font-weight:bold;
}

.estado-imagen{
    color:#2563eb;
    font-weight:bold;
}

.estado-examinada{
    color:#9333ea;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
    Procesador Automático de Facturas
</div>

<div class="container">

    <div class="card">

        <button onclick="procesar()">
            Procesar carpeta entrada
        </button>

        <div class="grid">

            <div class="kpi">
                <div id="entrada" class="kpi-num">0</div>
                <div class="kpi-text">Entrada</div>
            </div>

            <div class="kpi">
                <div id="procesadas" class="kpi-num">0</div>
                <div class="kpi-text">Procesadas</div>
            </div>

            <div class="kpi">
                <div id="imagenes" class="kpi-num">0</div>
                <div class="kpi-text">Imágenes</div>
            </div>

            <div class="kpi">
                <div id="manual" class="kpi-num">0</div>
                <div class="kpi-text">Manual</div>
            </div>

            <div class="kpi">
                <div id="examinadas" class="kpi-num">0</div>
                <div class="kpi-text">Examinadas</div>
            </div>

            <div class="kpi">
                <div id="albaran" class="kpi-num">0</div>
                <div class="kpi-text">Albaranes</div>
            </div>

            <div class="kpi">
                <div id="reenviar_pedido" class="kpi-num">0</div>
                <div class="kpi-text">Reenviar (falta pedido cliente)</div>
            </div>

        </div>

    </div>

    <div class="card">
        <h3>Última ejecución</h3>

        <div id="resultado">
            Sin ejecutar
        </div>
    </div>

</div>

<script>

async function cargarEstadisticas(){

    const res = await fetch("/estadisticas");

    const data = await res.json();

    document.getElementById("entrada").innerText =
        data.entrada || 0;

    document.getElementById("procesadas").innerText =
        data.procesadas || 0;

    document.getElementById("imagenes").innerText =
        data.imagenes || 0;

    document.getElementById("manual").innerText =
        data.manual || 0;

    document.getElementById("examinadas").innerText =
        data.examinadas || 0;

    document.getElementById("albaran").innerText =
        data.albaran || 0;

    document.getElementById("reenviar_pedido").innerText =
        data.reenviar_pedido || 0;
}

async function procesar(){

    document.getElementById("resultado").innerHTML =
        "Procesando...";

    const res = await fetch(
        "/procesar",
        {
            method:"POST"
        }
    );

    const data = await res.json();

    let html = `
        <table>
            <tr>
                <th>Archivo</th>
                <th>Estado</th>
            </tr>
    `;

    data.resultados.forEach(r => {

        html += `
            <tr>
                <td>${r.archivo}</td>
                <td>${r.estado}</td>
            </tr>
        `;
    });

    html += "</table>";

    document.getElementById("resultado").innerHTML =
        html;

    cargarEstadisticas();
}

cargarEstadisticas();

</script>

</body>
</html>
